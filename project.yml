name: PulseDeck
options:
  bundleIdPrefix: com.example
  createIntermediateGroups: true
  xcodeVersion: "16.0"
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
schemes:
  PulseDeck:
    shared: true
    build:
      targets:
        PulseDeck: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
targets:
  PulseDeck:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PulseDeck
        excludes:
          - Resources
    resources:
      - PulseDeck/Resources/Assets.xcassets
    info:
      path: PulseDeck/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.appinstall.nov.carbon.lam
        DEVELOPMENT_TEAM: ZDV8SQG3XZ
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: iPhone Distribution
        PROVISIONING_PROFILE_SPECIFIER: CarbonLAM_Dist_Jan262026
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 0.1.0
        SWIFT_EMIT_LOC_STRINGS: YES
        TARGETED_DEVICE_FAMILY: "1"

name: PulseDeck IPA Export

on:
  workflow_dispatch:

jobs:
  export-ipa:
    runs-on: macos-15
    env:
      APP_SCHEME: PulseDeck
      PROJECT_PATH: PulseDeck.xcodeproj
      ARCHIVE_PATH: build/PulseDeck.xcarchive
      EXPORT_PATH: build/export
      BUNDLE_ID: ${{ secrets.PULSEDECK_BUNDLE_ID }}
      DEVELOPMENT_TEAM: ${{ secrets.PULSEDECK_DEVELOPMENT_TEAM }}
      APPLE_CERT_BASE64: ${{ secrets.PULSEDECK_CERTIFICATE_P12_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.PULSEDECK_CERTIFICATE_PASSWORD }}
      PROVISIONING_PROFILE_BASE64: ${{ secrets.PULSEDECK_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.PULSEDECK_KEYCHAIN_PASSWORD }}
      EXPORT_OPTIONS_BASE64: ${{ secrets.PULSEDECK_EXPORT_OPTIONS_PLIST_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Prepare CI paths
        run: |
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db" >> "$GITHUB_ENV"
          echo "PP_PATH=$RUNNER_TEMP/PulseDeck.mobileprovision" >> "$GITHUB_ENV"
          echo "EXPORT_OPTIONS_PATH=$RUNNER_TEMP/ExportOptions.plist" >> "$GITHUB_ENV"
          echo "CERT_P12_PATH=$RUNNER_TEMP/signing.p12" >> "$GITHUB_ENV"

      - name: Validate signing secrets
        run: |
          missing=0
          for key in \
            BUNDLE_ID \
            DEVELOPMENT_TEAM \
            APPLE_CERT_BASE64 \
            APPLE_CERT_PASSWORD \
            PROVISIONING_PROFILE_BASE64 \
            KEYCHAIN_PASSWORD \
            EXPORT_OPTIONS_BASE64
          do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required secret/env: $key" >&2
              missing=1
            fi
          done
          if [[ $missing -ne 0 ]]; then
            exit 1
          fi

      - name: Decode signing assets
        run: |
          echo "$APPLE_CERT_BASE64" | base64 --decode > "$CERT_P12_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          echo "$EXPORT_OPTIONS_BASE64" | base64 --decode > "$EXPORT_OPTIONS_PATH"

      - name: Create temporary keychain
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_P12_PATH" \
            -P "$APPLE_CERT_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "Installed provisioning profile: $UUID"

      - name: Archive app
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$APP_SCHEME" \
            -configuration Release \
            -destination generic/platform=iOS \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            -archivePath "$ARCHIVE_PATH" \
            clean archive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PulseDeck-ipa
          path: |
            build/export/*.ipa
            build/export/*.plist
            build/PulseDeck.xcarchive
          if-no-files-found: error

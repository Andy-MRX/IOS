name: PulseDeck CI

on:
  push:
    paths:
      - '.github/workflows/pulsedeck-ci.yml'
      - 'PulseDeck/**'
      - 'PulseDeck.xcodeproj/**'
      - 'project.yml'
      - 'README.md'
      - 'scripts/**'
      - 'docs/**'
      - 'export/**'
  pull_request:
    paths:
      - '.github/workflows/pulsedeck-ci.yml'
      - 'PulseDeck/**'
      - 'PulseDeck.xcodeproj/**'
      - 'project.yml'
      - 'README.md'
      - 'scripts/**'
      - 'docs/**'
      - 'export/**'
  workflow_dispatch:

jobs:
  build-simulator:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate project
        run: xcodebuild -list -project PulseDeck.xcodeproj

      - name: Build for iOS Simulator (no signing)
        run: |
          xcodebuild \
            -project PulseDeck.xcodeproj \
            -scheme PulseDeck \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            build
